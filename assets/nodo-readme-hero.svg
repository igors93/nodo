      <stop offset="0%" stop-color="#7CFFBF"/>
      <stop offset="100%" stop-color="#16B879"/>
    </linearGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.2  0 0 0 0 0.9  0 0 0 0 1  0 0 0 0.75 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <filter id="greenGlow" x="-80%" y="-80%" width="260%" height="260%">
