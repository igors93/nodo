<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Nodo - Proof of Protection Blockchain</title>
  <desc id="desc">Conceptual banner showing validators, auditable state, encrypted delivery, and evidence-backed security.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#123A4A"/>
      <stop offset="46%" stop-color="#0B1720"/>
      <stop offset="100%" stop-color="#060A0F"/>
