name: Nodo CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nodo-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-build-and-tests:
    name: Linux build and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install compiler toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Show compiler versions
        run: |
          gcc --version
          g++ --version

      - name: Make scripts executable
        run: |
          chmod +x scripts/*.sh

      - name: Build Nodo
        run: |
          ./scripts/clean.sh
          ./scripts/build.sh

      - name: Run Nodo demo
        run: |
          ./build/nodo

      - name: Run all tests
        run: |
          ./scripts/test_all.sh